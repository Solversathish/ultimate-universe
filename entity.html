<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Entity | Ultimate Multiverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="top-bar">
  <div class="header-container">
    <div class="logo">
      <a href="home.html" style="text-decoration:none; color:white;">
        ULTIMATE MULTIVERSE
      </a>
    </div>
  </div>
</header>
<main class="entity-container">

  <div class="entity-layout">

    <!-- LEFT IMAGE -->
    <div class="entity-image">
      <img id="entityHero">
    </div>

    <!-- RIGHT DETAILS -->
    <div class="entity-details">

      <h1 id="entityName"></h1>

      <!-- META INFO -->
      <div class="entity-meta">

        <div class="meta-item">
          <span class="meta-label">Age</span>
          <span id="entityAge"></span>
        </div>

        <div class="meta-item">
          <span class="meta-label">Category</span>
          <span id="entityCategory"></span>
        </div>

        <div class="meta-item">
          <span class="meta-label">Anime</span>
          <span id="entityAnime"></span>
        </div>

      </div>

      <!-- TABS -->
      <div class="entity-tabs">

        <button class="tab active" data-tab="description">Description</button>
        <button class="tab" data-tab="powers">Powers</button>
        <button class="tab" data-tab="info">Info</button>

      </div>

      <!-- CONTENT -->
      <div class="entity-content">

        <div id="descriptionTab" class="tab-content active"></div>

        <div id="powersTab" class="tab-content"></div>

        <div id="infoTab" class="tab-content"></div>

      </div>

    </div>

  </div>

</main>

<script src="assets/js/entity.js" defer></script>

</body>
</html>
