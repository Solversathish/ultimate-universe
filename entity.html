<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Entity | Ultimate Multiverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="top-bar">
  <div class="header-container">
    <div class="logo">
      <a href="home.html" style="text-decoration:none; color:white;">
        ULTIMATE MULTIVERSE
      </a>
    </div>
  </div>
</header>
<main class="entity-container">

  <div class="entity-layout">

    <!-- LEFT IMAGE -->
    <div class="entity-image">
      <img id="entityHero">
    </div>

    <!-- RIGHT DETAILS -->
    <div class="entity-details">

      <h1 id="entityName"></h1>

      <!-- ACTION BUTTONS -->
      <div class="entity-actions">
        <button>Power</button>
        <button>Abilities</button>
        <button>Weapons</button>
      </div>

      <!-- TABS -->
      <div class="entity-tabs">
        <button class="tab active">Info</button>
        <button class="tab">Stats</button>
        <button class="tab">History</button>
      </div>

      <!-- CONTENT AREA -->
      <div class="entity-content" id="entityDescription">
      </div>

    </div>

  </div>

</main>

<script src="assets/js/entity.js" defer></script>

</body>
</html>
